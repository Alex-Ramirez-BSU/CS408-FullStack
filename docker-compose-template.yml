services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: springboot-app
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "8080"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge