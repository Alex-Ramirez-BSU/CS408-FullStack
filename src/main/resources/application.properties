spring.application.name=survey
spring.thymeleaf.cache=false

# H2 Database in file mode (persistent dev data)
spring.datasource.url=jdbc:h2:file:./data/myappdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Execute SQL files from db folder
# spring.sql.init.mode=embedded to keep persistence in the future
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql

# JPA should not override SQL
spring.jpa.hibernate.ddl-auto=none

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console