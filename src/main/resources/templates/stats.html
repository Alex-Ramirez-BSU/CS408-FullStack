<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Template</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Trails</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/trails">Trails</a>
            <a class="nav-link" href="/add">Add</a>
            <a class="nav-link" href="/stats">Stats</a>
        </div>
    </div>
</nav>

<!-- Page content -->
<div>
    <h1 th:text="${title}"></h1>
    <div class="container mt-4">
        <h1 class="mb-4 text-center">Trail Statistics</h1>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h5>Total Trails</h5>
                    <p class="display-6" th:text="${totalTrails}">0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h5>Total Distance</h5>
                    <p class="display-6">
                        <span th:text="${#numbers.formatDecimal(totalDistance, 1, 2)}">0.00</span> mi
                    </p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h5>Average Rating</h5>
                    <p class="display-6" th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">0.0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h5>Easy Trails</h5>
                    <p class="display-6" th:text="${easyTrails}">0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h5>Medium Trails</h5>
                    <p class="display-6" th:text="${mediumTrails}">0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <h5>Hard Trails</h5>
                    <p class="display-6" th:text="${hardTrails}">0</p>
                </div>
            </div>

            <div class="col-md-12">
                <div class="card shadow-sm text-center p-3">
                    <h5>Longest Trail</h5>
                    <p class="display-6">
                        <span th:text="${#numbers.formatDecimal(longestTrail, 1, 2)}">0.00</span> mi
                    </p>
                </div>
            </div>

        </div>
    </div>
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Trail Charts</h2>

        <div class="row">
            <div class="col-md-8 mb-4">
                <div class="card p-4 shadow-sm">
                    <h4 class="text-center">Trails Per Month</h4>
                    <canvas id="monthlyTrailsChart"></canvas>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card p-4 shadow-sm">
                    <h4 class="text-center">Difficulty Breakdown</h4>
                    <canvas id="difficultyPieChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>This is Changes I made</p>
</footer>
<script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const trailsPerMonth = [[${trailsPerMonth}]];

    const easyTrails = [[${easyTrails}]];
    const mediumTrails = [[${mediumTrails}]];
    const hardTrails = [[${hardTrails}]];

    const monthLabels = [
        "Jan", "Feb", "Mar", "Apr", "May", "Jun",
        "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
    ];

    new Chart(document.getElementById('monthlyTrailsChart'), {
        type: 'bar',
        data: {
            labels: monthLabels,
            datasets: [{
                label: 'Number of Trails',
                data: trailsPerMonth
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });

    new Chart(document.getElementById('difficultyPieChart'), {
        type: 'pie',
        data: {
            labels: ['Easy', 'Medium', 'Hard'],
            datasets: [{
                data: [easyTrails, mediumTrails, hardTrails]
            }]
        },
        options: {
            responsive: true
        }
    });
</script>
</body>
</html>
