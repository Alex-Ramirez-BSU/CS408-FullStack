<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trail</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Trails</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/trails">Trails</a>
            <a class="nav-link" href="/add">Add</a>
            <a class="nav-link" href="/stats">Stats</a>
        </div>
    </div>
</nav>
<!-- Page Content -->
<div>
    <h1 th:text="${title}"></h1>
    <p th:text="${message}"></p>
</div>
<!-- From Content-->
<form th:action="@{/add-trail}" th:object="${trail}" method="post">
    <input type="hidden" th:field="*{id}">
    <label for="name">Trail Name:</label>
    <input type="text" id="name" th:field="*{name}" placeholder="Grand Canyon National Park" required>

    <label for="date">Date:</label>
    <input type="date" id="date" th:field="*{date}" required>

    <label for="city">City:</label>
    <input type="text" id="city" th:field="*{city}" placeholder="Grand Canyon Village" required>

    <label for="state">State:</label>
    <input type="text" id="state" th:field="*{state}" placeholder="Arizona | AZ">

    <label for="difficulty">Difficulty: </label>
    <select id="difficulty" th:field="*{difficulty}">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>

    <label for="distance">Distance: </label>
    <input type="number" step="0.01" id="distance" th:field="*{distance}" min="0" placeholder="in miles" required>

    <label for="rating">Rating: </label>
    <select id="rating" th:field="*{rating}">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>

    <label for="notes">Notes: </label>
    <textarea id="notes" th:field="*{notes}"></textarea>
    <button type="reset">Reset</button>
    <button type="submit">Add Item</button>
</form>

<!-- Footer -->
<footer>
    <p>This is Changes I made</p>
</footer>
<script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
</body>
</html>
