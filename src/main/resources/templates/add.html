<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trail</title>
    <link rel="icon" type="image/x-icon" href="/images/logo/tt_favicon.png">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Trails</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/trails">Trails</a>
            <a class="nav-link" href="/add">Add</a>
            <a class="nav-link" href="/stats">Stats</a>
        </div>
    </div>
</nav>
<!-- Page Content -->
<main>
    <div>
        <h1 th:text="${title}"></h1>
        <p th:text="${message}"></p>
    </div>
    <!-- From Content-->
    <form th:action="@{/add-trail}" th:object="${trail}" method="post">
        <input type="hidden" th:field="*{id}">
        <label for="name">Trail Name:</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Grand Canyon National Park" required>

        <label for="date">Date:</label>
        <input type="date" id="date" th:field="*{date}" required>

        <label for="city">City:</label>
        <input type="text" id="city" th:field="*{city}" placeholder="Grand Canyon Village" required>

        <label for="state">State:</label>
        <input type="text" id="state" th:field="*{state}" placeholder="Arizona | AZ">

        <label for="difficulty">Difficulty: </label>
        <select id="difficulty" th:field="*{difficulty}">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <label for="distance">Distance: </label>
        <input type="number" step="0.01" id="distance" th:field="*{distance}" min="0" placeholder="in miles" required>

        <label for="rating">Rating: </label>
        <select id="rating" th:field="*{rating}">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <label for="notes">Notes: </label>
        <textarea id="notes" th:field="*{notes}"></textarea>
        <button type="reset">Reset</button>
        <button type="submit">Add Item</button>
    </form>
</main>
<!-- Footer -->
<footer style="background-color:#222; color:white; padding:20px 0; margin-top:40px;">
    <div class="container">
        <div class="row text-center text-md-start footer-bottom">

            <div class="col-md-4 mb-3">
                <img class="footer-logo" src="/images/logo/tt_logo_expanded.png">
            </div>

            <!-- Info -->
            <div class="col-md-4 mb-3">
                <p><strong>Project Context</strong></p>
                <p>&copy; 2026 Trail Tracker. All rights reserved.</p>
                <p>CS408 Full Stack Web Development</p>
                <p>Created By: Alex Ramirez-Robles</p>
            </div>

            <!-- Links -->
            <div class="col-md-4 mb-3">
                <p><strong>Related Links</strong></p>
                <p>
                    <a href="https://github.com/Alex-Ramirez-BSU/CS408-FullStack" target="_blank" rel="noopener noreferrer" title="GitHub Repository">
                        <img class="footer-img" src="/images/github_logo.png" alt="GitHub Repository">
                        GitHub
                    </a>
                </p>
                <p>
                    <a href="https://www.boisestate.edu" target="_blank" rel="noopener noreferrer" title="Boise State University">
                        <img class="footer-img" src="/images/bsu_b_logo.png" alt="Boise State University">
                        Boise State University
                    </a>
                </p>
            </div>

        </div>

        <!-- Bottom Nav -->
        <div class="footer-bottom d-flex justify-content-center flex-wrap gap-3 pt-3 mt-3 border-top">
            <a href="/">Home</a> |
            <a href="/trails">Trails</a> |
            <a href="/add">Add</a> |
            <a href="/stats">Stats</a>
        </div>
    </div>
</footer>
<script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
</body>
</html>
